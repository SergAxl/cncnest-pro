name: Build CNCnest PRO

# Запускается при каждом push в main
# Можно запустить вручную: Actions → Run workflow
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest   # бесплатный Windows Server 2022 в облаке GitHub

    steps:
      # 1. Скачать код репозитория
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Установить Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Установить все зависимости (react, vite, electron, electron-builder)
      - name: Install dependencies
        run: npm ci

      # 4. Собрать React → dist/   затем   Electron → release/
      - name: Build app
        run: npm run electron:build
        env:
          # Отключить публикацию — только локальная сборка
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Сохранить .exe как артефакт (хранится 90 дней)
      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: CNCnest-PRO-Windows
          path: release/*.exe
          if-no-files-found: error
          retention-days: 90
